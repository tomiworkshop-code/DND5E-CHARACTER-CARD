<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<title>冒險者之書已升級 · 請前往 V2</title>
<script>
  (function () {
    // 保留舊網址的 query（例如 ?room=xxx）一起帶到 V2
    var qs = location.search || "";
    var target = "../v2/" + qs;

    // 清理舊版 PWA：卸載舊 Service Worker + 清除舊快取，避免幽靈快取。
    try {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    } catch (e) {}

    // 3 秒後自動導向 V2（給使用者看到升級提示；也可手動點按鈕）
    window.__V2_TARGET = target;
    setTimeout(function () { location.replace(target); }, 3000);
  })();
</script>
<style>
  :root { color-scheme: light; }
  body{
    margin:0; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;
    background:#f3f4f6; color:#1f2937; padding:24px; text-align:center;
  }
  .card{
    background:#fff; border:1px solid #e5e7eb; border-radius:20px;
    padding:28px 24px; max-width:360px; width:100%;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
  }
  img{ width:72px; height:72px; border-radius:16px; margin-bottom:12px; }
  h1{ font-size:20px; margin:0 0 8px; color:#111827; }
  p{ margin:6px 0; color:#6b7280; font-size:14px; line-height:1.6; }
  a.btn{
    display:inline-block; margin-top:18px; text-decoration:none;
    background:#3b82f6; color:#fff; font-weight:600; font-size:15px;
    padding:12px 28px; border-radius:12px;
  }
  a.btn:active{ opacity:.85; }
  .small{ font-size:12px; color:#9ca3af; margin-top:14px; }
</style>
</head>
<body>
  <div class="card">
    <img src="./icons/icon-192.png" alt="冒險者之書">
    <h1>📖 冒險者之書已升級</h1>
    <p>舊版（V1）已停用。<br>所有功能與你的角色資料都已搬到全新的 <b>V2 統一儀表板</b>，繼續使用即可。</p>
    <p class="small">正在自動為你轉跳到 V2…</p>
    <a class="btn" href="../v2/" onclick="var q=location.search||'';if(q){this.href='../v2/'+q;}">立即前往 V2 →</a>
    <p class="small">建議：若你曾把舊版加到主畫面，請移除舊圖示，於 V2 重新「加到主畫面」以取得最新版。</p>
  </div>
</body>
</html>
