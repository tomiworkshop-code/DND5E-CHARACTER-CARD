<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c5a3a">
<title>D&D 5E · 選擇入口</title>
<!-- 舊網址相容：保留 ?room= 參數導向玩家版（冒險者之書） -->
<script>
  (function () {
    var qs = location.search || "";
    // 帶 room 參數 → 直接進玩家版加入房間
    if (/[?&]room=/.test(qs)) {
      location.replace("./adventurer/" + qs);
      return;
    }
  })();
</script>
<style>
  :root { color-scheme: light dark; }
  body{
    margin:0; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:22px;
    font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;
    background:#f3e9d2; color:#3b2a1a; padding:24px;
  }
  h1{ font-size:20px; margin:0 0 4px; color:#5a3d22; }
  p{ margin:0; color:#6b5034; font-size:13px; text-align:center; }
  .cards{ display:flex; flex-direction:column; gap:16px; width:100%; max-width:340px; }
  a.card{
    display:flex; align-items:center; gap:14px; text-decoration:none;
    background:#fff8ea; border:1px solid #caa96f; border-radius:16px;
    padding:16px 18px; color:#3b2a1a; box-shadow:0 2px 8px rgba(90,61,34,.12);
    transition:transform .08s ease;
  }
  a.card:active{ transform:scale(.98); }
  a.card img{ width:56px; height:56px; border-radius:12px; }
  .t{ font-weight:700; font-size:16px; color:#5a3d22; }
  .s{ font-size:12px; color:#6b5034; }
  footer{ font-size:11px; color:#8a7a5a; margin-top:8px; }
</style>
</head>
<body>
  <div>
    <h1 style="text-align:center">⚔️ D&D 5E 桌遊工具</h1>
    <p>請選擇你的身分入口</p>
  </div>
  <div class="cards">
    <a class="card" href="./adventurer/">
      <img src="./adventurer/icons/icon-192.png" alt="冒險者之書">
      <div>
        <div class="t">📖 冒險者之書</div>
        <div class="s">玩家版 · 角色卡 / 背包 / 法術書</div>
      </div>
    </a>
    <a class="card" href="./worldbuilder/">
      <img src="./worldbuilder/icons/icon-192.png" alt="敘事者之書">
      <div>
        <div class="t">📖 敘事者之書</div>
        <div class="s">DM 版 · 世界建構 / 開房 / 跑團控制台</div>
      </div>
    </a>
  </div>
  <footer>Powered by D&D 5E SRD 5.1 (CC-BY-4.0)</footer>
</body>
</html>
