<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7c5a3a">
<title>地下城指南 · 世界建構器（原型）</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --ink:#3b2a1a; --ink-soft:#6b5034; --gold:#7c5a3a; --gold-deep:#5a3d22;
    --paper:#f3e9d2; --paper-2:#e9dab6; --line:#caa96f; --accent:#8a5a2b;
  }
  html[data-theme="dark"]{
    --ink:#f0e6d2; --ink-soft:#d4c2a8; --gold:#e8c37d; --gold-deep:#f5d08a;
    --paper:#1a1510; --paper-2:#282018; --line:#6a5332; --accent:#f2b86b;
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:"Noto Serif TC","Songti TC","STKaiti",serif;
    color:var(--ink); background-color:var(--paper);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(255,248,225,.55), transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(120,85,45,.18), transparent 55%),
      repeating-linear-gradient(0deg, rgba(120,85,45,.025) 0 2px, transparent 2px 5px);
    min-height:100vh;
  }
  .card{
    background:linear-gradient(180deg, rgba(255,252,240,.9), rgba(233,218,182,.78));
    border:1px solid var(--line); border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 6px 14px -8px rgba(90,61,34,.5);
  }
  html[data-theme="dark"] .card{
    background:linear-gradient(180deg, rgba(40,32,24,.9), rgba(30,24,18,.85));
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 6px 14px -8px rgba(0,0,0,.8);
  }
  input,select,textarea{
    background:rgba(255,253,247,.85); border:1px solid var(--line);
    border-radius:10px; color:var(--ink); outline:none; width:100%;
  }
  html[data-theme="dark"] input, html[data-theme="dark"] select, html[data-theme="dark"] textarea{ background:rgba(30,24,18,.8); }
  input:focus,select:focus,textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(138,90,43,.2); }
  .btn{ border-radius:10px; border:1px solid var(--gold-deep); background:linear-gradient(180deg,#9a6a36,#7c5a3a); color:#fdf6e3; font-weight:600; cursor:pointer; }
  .btn-ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .btn-danger{ background:linear-gradient(180deg,#a4442f,#7e3322); border-color:#7e3322; color:#fdf6e3; }
  .title-deco{ letter-spacing:.06em; color:var(--gold-deep); }
  .catbtn{ display:flex; align-items:center; gap:.5rem; width:100%; padding:.5rem .6rem; border-radius:10px; border:1px solid transparent; color:var(--ink-soft); cursor:pointer; background:transparent; text-align:left; }
  .catbtn.active{ background:rgba(138,90,43,.14); border-color:var(--line); color:var(--gold-deep); font-weight:700; }
  .catbtn svg{ width:20px; height:20px; flex:none; }
  .listitem{ padding:.55rem .6rem; border-radius:10px; border:1px solid var(--line); cursor:pointer; }
  .listitem.active{ border-color:var(--accent); box-shadow:0 0 0 2px rgba(138,90,43,.18); }
  .chip{ display:inline-flex; align-items:center; gap:.25rem; padding:.15rem .5rem; border-radius:999px; border:1px solid var(--line); background:rgba(202,169,111,.16); font-size:12px; }
  .chip svg{ width:13px; height:13px; }
  .ic{ width:16px; height:16px; }
  .layout{ display:grid; gap:.75rem; grid-template-columns:170px 1fr; align-items:start; }
  @media (max-width:640px){
    .layout{ grid-template-columns:1fr; }
    .catrail{ display:flex; flex-wrap:wrap; }
    .catrail .catbtn{ width:auto; }
  }
</style>
</head>
<body>
<div id="app" v-cloak></div>

<template id="root">
<div class="max-w-5xl mx-auto p-3">
  <!-- header -->
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-xl font-bold title-deco flex items-center gap-2">
      <svg class="ic" style="width:22px;height:22px"><use href="#w-book"></use></svg>
      地下城指南 · 世界建構器
      <span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(138,90,43,.15);color:var(--accent)">原型 Prototype</span>
    </h1>
    <button class="btn-ghost btn px-2 py-1.5 text-sm flex items-center gap-1" @click="toggleTheme">
      <svg class="ic"><use :href="theme==='dark' ? '#w-sun' : '#w-moon'"></use></svg>
      <span class="hidden sm:inline">{{ theme==='dark' ? '淺色' : '深色' }}</span>
    </button>
  </div>

  <!-- world bar (world container layer) -->
  <div class="card p-2 mb-3">
    <div class="flex items-center gap-2 flex-wrap">
      <svg class="ic" style="color:var(--gold-deep)"><use href="#w-globe"></use></svg>
      <span class="text-sm font-bold" style="color:var(--ink-soft)">世界</span>
      <select v-model="activeWorld" class="px-2 py-1.5 text-sm" style="flex:1;min-width:140px">
        <option v-for="w in worlds" :key="w.id" :value="w.id">{{ w.name || '（未命名世界）' }}</option>
      </select>
      <button class="btn px-2 py-1.5 text-sm flex items-center gap-1" @click="addWorld">
        <svg class="ic"><use href="#w-plus"></use></svg><span class="hidden sm:inline">新世界</span>
      </button>
      <button class="btn-ghost btn px-2 py-1.5 text-sm flex items-center gap-1" @click="manageOpen=!manageOpen">
        <svg class="ic"><use href="#w-edit"></use></svg><span class="hidden sm:inline">管理</span>
      </button>
    </div>
    <div v-if="manageOpen && currentWorld" class="mt-2 pt-2" style="border-top:1px solid var(--line)">
      <label class="text-xs block">世界名稱
        <input v-model="currentWorld.name" class="mt-1 px-2 py-1.5 text-sm" placeholder="例：費倫大陸 / 破碎群島">
      </label>
      <label class="text-xs block mt-2">世界設定簡介
        <textarea v-model="currentWorld.desc" rows="3" class="mt-1 px-2 py-2 text-sm" placeholder="這個世界的基調、規則、風格…（給 DM 的備註）"></textarea>
      </label>
      <div class="grid gap-2 mt-2" style="grid-template-columns:1fr 1fr">
        <label class="text-xs">等級上限 (5E 預設 20)
          <input type="number" min="1" max="20" v-model.number="currentWorld.levelCap" class="mt-1 px-2 py-1.5 text-sm" placeholder="20">
        </label>
        <label class="text-xs">最高稀有度基準
          <select v-model="currentWorld.rarityBase" class="mt-1 px-2 py-1.5 text-sm">
            <option v-for="r in rarityOpts" :key="r.v" :value="r.v">{{ r.t }}（{{ r.v }}）</option>
          </select>
        </label>
      </div>
      <div class="flex justify-end mt-2">
        <button class="btn-danger btn px-2 py-1 text-xs flex items-center gap-1" @click="removeWorld(currentWorld)" :disabled="worlds.length<=1">
          <svg class="ic"><use href="#w-trash"></use></svg>刪除此世界
        </button>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- category rail -->
    <aside class="card p-2 self-start catrail">
      <div class="text-[11px] font-bold mb-1 px-1" style="color:var(--ink-soft)">分類</div>
      <button v-for="cat in cats" :key="cat.id" class="catbtn" :class="{active: activeCat===cat.id}" @click="selectCat(cat.id)">
        <svg><use :href="'#'+cat.icon"></use></svg>
        <span class="flex-1">{{ cat.name }}</span>
        <span class="text-[11px] px-1.5 rounded-full" style="background:rgba(138,90,43,.15)">{{ countOf(cat.id) }}</span>
      </button>
    </aside>

    <!-- main -->
    <main class="min-w-0">
      <!-- list panel -->
      <div class="card p-3 mb-3">
        <div class="text-[11px] mb-2" style="color:var(--ink-soft)">
          <span class="font-bold" style="color:var(--gold-deep)">{{ (currentWorld && currentWorld.name) || '（未命名世界）' }}</span>
          <span> · {{ catName(activeCat) }}</span>
        </div>
        <div class="flex items-center gap-2 mb-2">
          <div class="flex items-center gap-1 flex-1 px-2 rounded-[10px]" style="border:1px solid var(--line);background:rgba(255,253,247,.6)">
            <svg class="ic" style="opacity:.6"><use href="#w-search"></use></svg>
            <input v-model="q" placeholder="搜尋…" style="border:0;background:transparent;padding:.4rem 0">
          </div>
          <button class="btn px-3 py-2 text-sm flex items-center gap-1" @click="addEntry">
            <svg class="ic"><use href="#w-plus"></use></svg>新增
          </button>
        </div>
        <div v-if="filtered.length===0" class="text-center text-sm py-6" style="color:var(--ink-soft)">
          此分類還沒有條目，點「新增」開始創造你的世界吧～
        </div>
        <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr))">
          <div v-for="e in filtered" :key="e.id" class="listitem" :class="{active: sel && sel.id===e.id}" @click="sel=e">
            <div class="flex items-center gap-1.5">
              <svg class="ic" style="color:var(--gold-deep)"><use :href="'#'+iconOf(e.cat)"></use></svg>
              <span class="font-bold text-sm truncate">{{ e.name || '（未命名）' }}</span>
            </div>
            <div class="text-[11px] mt-0.5 truncate" style="color:var(--ink-soft)">{{ e.subtype || catName(e.cat) }}</div>
          </div>
        </div>
      </div>

      <!-- detail editor -->
      <div v-if="sel" class="card p-3">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <svg class="ic" style="color:var(--gold-deep)"><use :href="'#'+iconOf(sel.cat)"></use></svg>
            <span class="title-deco font-bold">編輯 · {{ catName(sel.cat) }}</span>
          </div>
          <button class="btn-danger btn px-2 py-1 text-xs flex items-center gap-1" @click="removeEntry(sel)">
            <svg class="ic"><use href="#w-trash"></use></svg>刪除
          </button>
        </div>
        <div class="grid gap-2" style="grid-template-columns:1fr 1fr">
          <label class="text-xs col-span-2 sm:col-span-1">名稱
            <input v-model="sel.name" class="mt-1 px-2 py-1.5 text-sm" placeholder="例：暮鴉鎮 / 灰鬍德魯伊">
          </label>
          <label class="text-xs col-span-2 sm:col-span-1">類型 / 標籤
            <input v-model="sel.subtype" class="mt-1 px-2 py-1.5 text-sm" placeholder="例：港口城鎮 / 商會會長">
          </label>
        </div>
        <label class="text-xs block mt-2">描述
          <textarea v-model="sel.desc" rows="4" class="mt-1 px-2 py-2 text-sm" placeholder="外觀、背景、祕密、給 DM 的備註…"></textarea>
        </label>

        <!-- combat toggle for NPC -->
        <label v-if="sel.cat==='npc'" class="text-[11px] flex items-center gap-1 mt-2" style="color:var(--ink-soft)">
          <input type="checkbox" v-model="sel.hasCombat" @change="onToggleCombat(sel)" style="width:auto">
          此 NPC 會戰鬥（顯示戰鬥數值）
        </label>

        <!-- stat block (5E) -->
        <div v-if="showStatBlock(sel) && sel.stats" class="mt-3 pt-3" style="border-top:1px solid var(--line)">
          <div class="text-xs font-bold flex items-center gap-1 mb-2" style="color:var(--gold-deep)">
            <svg class="ic"><use href="#w-monster"></use></svg>戰鬥數值（Stat Block · 5E）
          </div>
          <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(84px,1fr))">
            <label class="text-[11px]">CR<input v-model="sel.stats.cr" class="mt-0.5 px-2 py-1 text-sm" placeholder="1/4"></label>
            <label class="text-[11px]">體型<input v-model="sel.stats.size" class="mt-0.5 px-2 py-1 text-sm" placeholder="中型"></label>
            <label class="text-[11px]">AC<input v-model="sel.stats.ac" class="mt-0.5 px-2 py-1 text-sm" placeholder="13"></label>
            <label class="text-[11px]">HP<input v-model="sel.stats.hp" class="mt-0.5 px-2 py-1 text-sm" placeholder="22 (4d8+4)"></label>
            <label class="text-[11px]">速度<input v-model="sel.stats.speed" class="mt-0.5 px-2 py-1 text-sm" placeholder="30 ft"></label>
          </div>
          <div class="grid gap-1 mt-2" style="grid-template-columns:repeat(6,1fr)">
            <div v-for="a in abilities" :key="a.k" class="text-center">
              <div class="text-[10px] font-bold" style="color:var(--ink-soft)">{{ a.t }}</div>
              <input type="number" v-model.number="sel.stats[a.k]" class="px-1 py-1 text-sm text-center">
              <div class="text-[10px]" style="color:var(--gold-deep)">{{ abilMod(sel.stats[a.k]) }}</div>
            </div>
          </div>
          <div class="grid gap-2 mt-2" style="grid-template-columns:1fr 1fr">
            <label class="text-[11px]">豁免 (Saves)<input v-model="sel.stats.saves" class="mt-0.5 px-2 py-1 text-sm" placeholder="體質 +3"></label>
            <label class="text-[11px]">技能 (Skills)<input v-model="sel.stats.skills" class="mt-0.5 px-2 py-1 text-sm" placeholder="察覺 +3, 隱匿 +4"></label>
            <label class="text-[11px]">感官 (Senses)<input v-model="sel.stats.senses" class="mt-0.5 px-2 py-1 text-sm" placeholder="黑暗視覺 60ft, 被動察覺 12"></label>
            <label class="text-[11px]">語言<input v-model="sel.stats.languages" class="mt-0.5 px-2 py-1 text-sm" placeholder="通用語, 地精語"></label>
            <label class="text-[11px] col-span-2">抗性 / 免疫 / 弱點<input v-model="sel.stats.resist" class="mt-0.5 px-2 py-1 text-sm" placeholder="抗:寒冷｜免:毒素｜弱:火焰"></label>
          </div>
          <div class="mt-3">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[11px] font-bold" style="color:var(--ink-soft)">特殊能力 (Traits)</span>
              <button class="btn-ghost btn px-2 py-0.5 text-[11px]" @click="addTrait(sel)">＋新增</button>
            </div>
            <div v-for="(t,i) in sel.traits" :key="'t'+i" class="flex gap-1 mb-1">
              <input v-model="t.name" class="px-2 py-1 text-sm" style="flex:0 0 32%" placeholder="能力名稱">
              <input v-model="t.desc" class="px-2 py-1 text-sm" style="flex:1" placeholder="效果描述">
              <button class="btn-danger btn px-2 text-[11px]" @click="removeTrait(sel,i)">✕</button>
            </div>
          </div>
          <div class="mt-2">
            <div class="flex items-center justify-between mb-1">
              <span class="text-[11px] font-bold" style="color:var(--ink-soft)">動作 / 攻擊 (Actions)</span>
              <button class="btn-ghost btn px-2 py-0.5 text-[11px]" @click="addAction(sel)">＋新增</button>
            </div>
            <div v-for="(a,i) in sel.actions" :key="'a'+i" class="flex gap-1 mb-1">
              <input v-model="a.name" class="px-2 py-1 text-sm" style="flex:0 0 32%" placeholder="爪擊">
              <input v-model="a.desc" class="px-2 py-1 text-sm" style="flex:1" placeholder="+4 命中, 1d6+2 揮砍傷害">
              <button class="btn-danger btn px-2 text-[11px]" @click="removeAction(sel,i)">✕</button>
            </div>
          </div>
        </div>

        <!-- relations -->
        <div class="mt-3">
          <div class="text-xs font-bold flex items-center gap-1 mb-1" style="color:var(--gold-deep)">
            <svg class="ic"><use href="#w-link"></use></svg>關聯（跨條目連結）
          </div>
          <div class="flex flex-wrap gap-1.5 mb-2">
            <span v-for="rid in sel.links" :key="rid" class="chip">
              <svg><use :href="'#'+iconOf(entryById(rid).cat)"></use></svg>
              {{ entryById(rid).name || '（未命名）' }}
              <svg class="cursor-pointer" style="width:12px;height:12px" @click="unlink(rid)"><use href="#w-x"></use></svg>
            </span>
            <span v-if="!sel.links.length" class="text-[11px]" style="color:var(--ink-soft)">尚無關聯</span>
          </div>
          <select @change="linkTo($event.target.value); $event.target.value=''" class="px-2 py-1.5 text-sm">
            <option value="">＋ 連結到其他條目…</option>
            <optgroup v-for="cat in cats" :key="cat.id" :label="cat.name">
              <option v-for="e in entriesOf(cat.id)" :key="e.id" :value="e.id" :disabled="e.id===sel.id || sel.links.includes(e.id)">
                {{ e.name || '（未命名）' }}
              </option>
            </optgroup>
          </select>
        </div>
      </div>
      <div v-else class="card p-6 text-center text-sm" style="color:var(--ink-soft)">
        從上方清單選一個條目來編輯，或按「新增」創造第一個 ✦
      </div>
    </main>
  </div>

  <p class="text-center text-[10px] mt-4" style="color:var(--ink-soft)">
    原型・資料僅存在本機瀏覽器（localStorage）。未來階段：唯讀分享 → 即時同步（PartyKit / BaaS）。
  </p>
</div>
</template>

<script>
const { createApp, ref, reactive, computed, watch } = Vue;
const LS = "dm_worldbuilder_v1";
const LS_WORLDS = "dm_worldbuilder_worlds_v1";
const LS_ACTIVE = "dm_worldbuilder_active_v1";
// 5E 官方稀有度分級（最高原則：一切以 5E 為基底）
const RARITY = [
  {v:"Common",    t:"普通"},
  {v:"Uncommon",  t:"罕見"},
  {v:"Rare",      t:"稀有"},
  {v:"Very Rare", t:"非常稀有"},
  {v:"Legendary", t:"傳說"}
];
// 5E 六大屬性
const ABILITIES = [
  {k:"str",t:"力量"},{k:"dex",t:"敏捷"},{k:"con",t:"體質"},
  {k:"int",t:"智力"},{k:"wis",t:"感知"},{k:"cha",t:"魅力"}
];
const uid = () => "e"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);

createApp({
  template: "#root",
  setup(){
    const cats = [
      { id:"location", name:"地點",  icon:"w-loc" },
      { id:"town",     name:"城鎮",  icon:"w-town" },
      { id:"faction",  name:"勢力",  icon:"w-faction" },
      { id:"npc",      name:"NPC",   icon:"w-npc" },
      { id:"monster",  name:"怪物",  icon:"w-monster" },
      { id:"weapon",   name:"武器",  icon:"w-weapon" },
      { id:"treasure", name:"寶物",  icon:"w-treasure" },
    ];
    const catMap = Object.fromEntries(cats.map(c=>[c.id,c]));

    // ---- entries ----
    let savedEntries = [];
    try{ savedEntries = JSON.parse(localStorage.getItem(LS)) || []; }catch(e){}
    // ---- worlds (world container layer) ----
    let savedWorlds = [];
    try{ savedWorlds = JSON.parse(localStorage.getItem(LS_WORLDS)) || []; }catch(e){}
    if(savedWorlds.length === 0){
      // migration: create a default world; pre-existing flat entries get adopted below
      savedWorlds = [{ id: uid(), name: "預設世界", desc: "", levelCap: 20, rarityBase: "Rare" }];
    }
    // normalize world-layer fields for older saves
    savedWorlds.forEach(w=>{ if(w.levelCap==null) w.levelCap = 20; if(!w.rarityBase) w.rarityBase = "Rare"; });
    // ensure every entry belongs to a world (adopts legacy flat entries)
    savedEntries.forEach(e=>{ if(!e.worldId) e.worldId = savedWorlds[0].id; });
    const entries = reactive(savedEntries);
    const worlds = reactive(savedWorlds);
    let aw = localStorage.getItem(LS_ACTIVE) || savedWorlds[0].id;
    if(!savedWorlds.find(w=>w.id===aw)) aw = savedWorlds[0].id;
    const activeWorld = ref(aw);
    const manageOpen = ref(false);
    const currentWorld = computed(()=> worlds.find(w=>w.id===activeWorld.value) || worlds[0]);
    const activeCat = ref("location");
    const sel = ref(null);
    const q = ref("");
    const theme = ref(localStorage.getItem("dm_theme") || "light");
    document.documentElement.setAttribute("data-theme", theme.value);

    const iconOf = id => (catMap[id]||{}).icon || "w-book";
    const catName = id => (catMap[id]||{}).name || id;
    const inWorld = e => e.worldId === activeWorld.value;
    const countOf = id => entries.filter(e=>e.cat===id && inWorld(e)).length;
    const entriesOf = id => entries.filter(e=>e.cat===id && inWorld(e));
    const entryById = id => entries.find(e=>e.id===id) || {name:"（已刪除）",cat:"location"};

    const filtered = computed(()=>{
      const s = q.value.trim().toLowerCase();
      return entries.filter(e=> e.cat===activeCat.value && inWorld(e) &&
        (!s || (e.name||"").toLowerCase().includes(s) || (e.subtype||"").toLowerCase().includes(s)));
    });

    function selectCat(id){ activeCat.value=id; sel.value=null; q.value=""; }
    function addEntry(){
      const e = reactive({ id:uid(), cat:activeCat.value, worldId:activeWorld.value, name:"", subtype:"", desc:"", links:[], hasCombat:false });
      if(e.cat==="monster") ensureStats(e);
      entries.push(e); sel.value = e;
    }
    function removeEntry(e){
      const i = entries.indexOf(e); if(i>=0) entries.splice(i,1);
      entries.forEach(x=>{ const j=x.links.indexOf(e.id); if(j>=0) x.links.splice(j,1); });
      if(sel.value===e) sel.value=null;
    }
    function linkTo(id){ if(id && sel.value && !sel.value.links.includes(id)){
      sel.value.links.push(id);
      const other = entryById(id); if(other && Array.isArray(other.links) && !other.links.includes(sel.value.id)) other.links.push(sel.value.id);
    }}
    function unlink(id){
      const i = sel.value.links.indexOf(id); if(i>=0) sel.value.links.splice(i,1);
      const other = entryById(id); if(other && Array.isArray(other.links)){ const j=other.links.indexOf(sel.value.id); if(j>=0) other.links.splice(j,1); }
    }
    function toggleTheme(){
      theme.value = theme.value==="dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", theme.value);
      localStorage.setItem("dm_theme", theme.value);
    }

    function addWorld(){
      const w = reactive({ id:uid(), name:"新世界", desc:"", levelCap:20, rarityBase:"Rare" });
      worlds.push(w); activeWorld.value = w.id; sel.value = null; manageOpen.value = true;
    }
    function removeWorld(w){
      if(worlds.length <= 1) return; // always keep at least one world
      let ok = true;
      try{ ok = window.confirm(`刪除世界「${w.name||'未命名'}」及其所有條目？此動作無法復原。`); }catch(e){ ok = true; }
      if(!ok) return;
      for(let i=entries.length-1;i>=0;i--){ if(entries[i].worldId===w.id) entries.splice(i,1); }
      const idx = worlds.indexOf(w); if(idx>=0) worlds.splice(idx,1);
      if(activeWorld.value===w.id) activeWorld.value = worlds[0].id;
      sel.value = null;
    }

    // ---- 5E stat block helpers (monsters / combat NPCs) ----
    function abilMod(score){ const n = parseInt(score,10); if(isNaN(n)) return "—"; const m = Math.floor((n-10)/2); return (m>=0?"+":"")+m; }
    function ensureStats(e){
      if(!e.stats) e.stats = { cr:"", size:"", ac:"", hp:"", speed:"", str:10,dex:10,con:10,int:10,wis:10,cha:10, senses:"", skills:"", saves:"", resist:"", languages:"" };
      if(!Array.isArray(e.actions)) e.actions = [];
      if(!Array.isArray(e.traits)) e.traits = [];
      return e.stats;
    }
    function showStatBlock(e){ return !!(e && (e.cat==="monster" || (e.cat==="npc" && e.hasCombat))); }
    function onToggleCombat(e){ if(e && e.hasCombat) ensureStats(e); }
    function addTrait(e){ ensureStats(e); e.traits.push({name:"", desc:""}); }
    function removeTrait(e,i){ if(e.traits) e.traits.splice(i,1); }
    function addAction(e){ ensureStats(e); e.actions.push({name:"", desc:""}); }
    function removeAction(e,i){ if(e.actions) e.actions.splice(i,1); }

    // persist migration result immediately (watchers only fire on later changes)
    try{
      localStorage.setItem(LS, JSON.stringify(entries));
      localStorage.setItem(LS_WORLDS, JSON.stringify(worlds));
      localStorage.setItem(LS_ACTIVE, activeWorld.value);
    }catch(e){}

    watch(entries, ()=>{ try{ localStorage.setItem(LS, JSON.stringify(entries)); }catch(e){} }, {deep:true});
    watch(worlds, ()=>{ try{ localStorage.setItem(LS_WORLDS, JSON.stringify(worlds)); }catch(e){} }, {deep:true});
    watch(activeWorld, ()=>{ try{ localStorage.setItem(LS_ACTIVE, activeWorld.value); }catch(e){} sel.value=null; });
    watch(sel, ()=>{ if(sel.value && showStatBlock(sel.value)) ensureStats(sel.value); });

    return { cats, activeCat, sel, q, theme, filtered, rarityOpts: RARITY,
      worlds, activeWorld, currentWorld, manageOpen,
      iconOf, catName, countOf, entriesOf, entryById,
      selectCat, addEntry, removeEntry, linkTo, unlink, toggleTheme,
      addWorld, removeWorld,
      abilities: ABILITIES, abilMod, showStatBlock, onToggleCombat,
      addTrait, removeTrait, addAction, removeAction };
  }
}).mount("#app");
</script>
